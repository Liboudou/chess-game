<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Error Catcher</title></head><body>
<div id="output"></div>
<script src="js/chess.js"></script>
<script src="js/evaluation.js"></script>
<script src="js/ai.js"></script>
<script>
window.addEventListener('error', function(e) {
  var o = document.getElementById('output');
  o.textContent += 'ERROR: ' + e.message + ' at ' + e.filename + ':' + e.lineno + ':' + e.colno + '\n';
  e.preventDefault();
  return true;
}, true);
</script>
<script src="js/app.js"></script>
<script>
var o = document.getElementById('output');
o.textContent += 'app.js loaded. app=' + typeof app;
try { renderBoard(); } catch(e) { o.textContent += ' renderBoard error: ' + e.message; }
</script>
</body></html>
