<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chess Game</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app-container">

    <!-- Header -->
    <div class="header">
      <h1>♚ Chess</h1>
      <div class="turn-indicator">
        <span id="turn-label">White to move</span>
        <span class="turn-dot white" id="turn-dot"></span>
      </div>
      <div class="header-controls">
        <button id="btn-new-game" class="btn primary" title="New Game">⟳ New Game</button>
        <button id="btn-undo" class="btn" title="Undo">↩ Undo</button>
        <div class="mode-toggle">
          <button id="mode-1v1" class="active" title="Play against another player">👤 1v1</button>
          <button id="mode-ai" title="Play against AI">🤖 AI</button>
        </div>
        <div class="ai-thinking" id="ai-thinking">
          <div class="spinner"></div>
          <span>Thinking...</span>
        </div>
      </div>
    </div>

    <!-- Game status -->
    <div class="game-status" id="game-status"></div>

    <!-- Main row: eval bar + board + side panel -->
    <div class="main-row">

      <!-- Evaluation Bar -->
      <div class="eval-bar-container" id="eval-bar-container">
        <div class="eval-fill-white" id="eval-fill-white" style="height:50%;"></div>
        <div class="eval-fill-black" id="eval-fill-black" style="height:50%;"></div>
        <span class="eval-label white-label">W</span>
        <span class="eval-label black-label">B</span>
        <div class="eval-score-container" id="eval-score-container">
          <span class="eval-score" id="eval-score">0.0</span>
        </div>
      </div>

      <!-- Board -->
      <div class="board-container">
        <div class="board-wrapper" style="position:relative;">
          <div id="chess-board"></div>

          <!-- Best move arrow canvas overlay -->
          <canvas id="best-move-canvas" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;display:none;"></canvas>

          <!-- Promotion dialog -->
          <div class="promotion-overlay" id="promotion-overlay">
            <div class="promotion-dialog">
              <div class="promo-title">Promote pawn to:</div>
              <div class="promo-options" id="promo-options"></div>
            </div>
          </div>
        </div>

        <!-- Rank labels -->
        <div class="board-labels rank-labels" id="rank-labels">
          <span>8</span><span>7</span><span>6</span><span>5</span>
          <span>4</span><span>3</span><span>2</span><span>1</span>
        </div>

        <!-- File labels -->
        <div class="board-labels file-labels" id="file-labels">
          <span>a</span><span>b</span><span>c</span><span>d</span>
          <span>e</span><span>f</span><span>g</span><span>h</span>
        </div>
      </div>

      <!-- Side Panel -->
      <div class="side-panel">

        <!-- AI Difficulty -->
        <div class="panel-card" id="difficulty-card" style="display:none;">
          <h3>AI Difficulty</h3>
          <div class="difficulty-selector">
            <button data-depth="1">1</button>
            <button data-depth="2">2</button>
            <button data-depth="3" class="active">3</button>
            <button data-depth="4">4</button>
            <button data-depth="5">5</button>
          </div>
        </div>

        <!-- Evaluation Toggle -->
        <div class="panel-card">
          <div class="eval-toggle">
            <input type="checkbox" id="eval-toggle" checked>
            <label for="eval-toggle">Evaluation bar</label>
          </div>
        </div>

        <!-- Post-game Analysis -->
        <div class="panel-card" id="analysis-panel" style="display:none;">
          <h3>Analysis</h3>
          <div class="controls analysis-controls">
            <button id="btn-first" title="First move">⏮</button>
            <button id="btn-prev" title="Previous move">◀</button>
            <button id="btn-next" title="Next move">▶</button>
            <button id="btn-last" title="Last move">⏭</button>
          </div>
          <div class="analysis-buttons" style="margin-top:6px;display:flex;gap:4px;">
            <button id="btn-analyze" class="primary" style="flex:1;">Analyze</button>
            <button id="btn-exit-analysis" style="flex:1;">Exit</button>
          </div>
          <div class="keyboard-hint" style="font-size:0.6rem;color:var(--text-dim);margin-top:4px;text-align:center;">
            ← → arrows to navigate
          </div>
        </div>

        <!-- Move History -->
        <div class="panel-card">
          <h3>Moves</h3>
          <div class="move-history" id="move-history">
            <span class="move-placeholder" style="color:var(--text-dim);font-size:0.7rem;">Game not started</span>
          </div>
        </div>

        <!-- Captured Pieces -->
        <div class="panel-card">
          <h3>Captured</h3>
          <div class="captured-pieces" id="captured-white"></div>
          <div class="captured-pieces" id="captured-black"></div>
        </div>

      </div>
    </div>
  </div>

  <script src="js/chess.js"></script>
  <script src="js/evaluation.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
